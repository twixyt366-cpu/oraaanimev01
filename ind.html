<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <meta name="description" content="OraaSlayer - المنصة العربية الأولى للأنمي" />
  <meta property="og:title" content="OraaSlayer" />
  <meta property="og:description" content="المنصة العربية الأولى للأنمي" />
  <meta property="og:type" content="website" />
  <meta property="twitter:card" content="summary" />
  <meta property="twitter:title" content="OraaSlayer" />
  <meta property="twitter:description" content="المنصة العربية الأولى للأنمي" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>OraaSlayer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/shared.css" />

  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --panel: #111827;
      --panel-2: #0f172a;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #60a5fa;
      --danger: #fca5a5;
      --success: #86efac;
      --gold: #fbbf24;
      --gold-glow: rgba(251, 191, 36, 0.3);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cairo', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
      overflow-x: hidden;
      direction: rtl;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      text-rendering: optimizeLegibility;
    }

    #app {
      min-height: 100dvh;
      position: relative;
    }

    /* ═══════════════════════════════════════════════════ */
    /*  SPLASH SCREEN — Twitter/X Style Entrance          */
    /* ═══════════════════════════════════════════════════ */
    .app-loading {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
    }

    .splash-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    .splash-bg-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.12);
      filter: blur(8px) brightness(0.35);
      animation: splashBgIn 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    @keyframes splashBgIn {
      to {
        transform: scale(1.05);
        filter: blur(0px) brightness(0.45);
      }
    }
    .splash-bg-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(251,191,36,0.12), transparent 60%),
        radial-gradient(ellipse 60% 50% at 50% 100%, rgba(96,165,250,0.08), transparent 50%),
        linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
    }

    .splash-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      text-align: center;
      padding: 24px;
      animation: splashContentIn 0.6s ease 0.3s both;
    }
    @keyframes splashContentIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .splash-logo-wrap {
      width: 110px;
      height: 110px;
      position: relative;
      animation: logoPop 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
    }
    @keyframes logoPop {
      0%   { opacity: 0; transform: scale(0.6) rotate(-10deg); }
      60%  { opacity: 1; transform: scale(1.08) rotate(2deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    .splash-logo-wrap::after {
      content: '';
      position: absolute;
      inset: -10%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(251,191,36,0.25) 0%, transparent 70%);
      animation: logoGlowPulse 2.5s ease-in-out infinite 1.2s;
      pointer-events: none;
    }
    @keyframes logoGlowPulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.15); }
    }

    .splash-logo-svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .splash-logo-svg .logo-ring {
      fill: none;
      stroke: url(#logoGrad);
      stroke-width: 7;
      stroke-linecap: round;
      stroke-dasharray: 290;
      stroke-dashoffset: 290;
      animation: drawRing 1.1s cubic-bezier(0.65, 0, 0.35, 1) 0.4s forwards;
      filter: drop-shadow(0 0 10px rgba(251,191,36,0.45));
    }
    @keyframes drawRing {
      to { stroke-dashoffset: 0; }
    }
    .splash-logo-svg .logo-o {
      fill: url(#logoGrad);
      opacity: 0;
      transform-origin: center;
      animation: oFadeIn 0.6s ease 0.9s forwards;
      filter: drop-shadow(0 0 8px rgba(251,191,36,0.35));
    }
    @keyframes oFadeIn {
      to { opacity: 1; }
    }

    .splash-brand {
      margin: 0;
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.6), 0 0 40px rgba(251,191,36,0.15);
      opacity: 0;
      animation: brandIn 0.7s ease 0.7s forwards;
    }
    @keyframes brandIn {
      from { opacity: 0; letter-spacing: 0.35em; transform: translateY(8px); }
      to   { opacity: 1; letter-spacing: 0.08em; transform: translateY(0); }
    }

    .splash-tagline {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--gold);
      opacity: 0;
      animation: taglineIn 0.6s ease 0.95s forwards;
    }
    @keyframes taglineIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 0.95; transform: translateY(0); }
    }

    .splash-spinner {
      margin-top: 10px;
      opacity: 0;
      animation: spinnerIn 0.5s ease 1.1s forwards;
    }
    @keyframes spinnerIn {
      to { opacity: 1; }
    }
    .splash-spinner .spinner-ring {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--gold);
      animation: spin 0.85s linear infinite;
      box-shadow: 0 0 18px var(--gold-glow);
    }

    .splash-loading-text {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
      opacity: 0;
      animation: textIn 0.5s ease 1.2s forwards;
    }
    @keyframes textIn {
      to { opacity: 1; }
    }

    /* Exit animation when app mounts */
    .app-loading.is-leaving {
      transition: opacity 0.45s ease, transform 0.55s cubic-bezier(0.65, 0, 0.35, 1);
      opacity: 0;
      transform: scale(1.06);
      pointer-events: none;
    }

    /* --- Page Transition Animations --- */
    #app {
      transition: opacity 0.12s ease;
    }
    #app.is-navigating {
      opacity: 0;
    }
    #app.is-entering {
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    #app.is-entering.show {
      opacity: 1;
    }

    .app-splash {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }

    .loader,
    .error-card {
      display: grid;
      gap: 14px;
      justify-items: center;
      padding: 26px 30px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: rgba(17, 24, 39, 0.78);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      min-width: min(360px, 92vw);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .router-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .router-overlay.visible {
      opacity: 1;
    }
    .router-skeleton {
      width: 40%;
      height: 100%;
      border-radius: 0;
      border: none;
      background: linear-gradient(90deg, var(--gold), #ffe082, var(--gold));
      background-size: 200% 100%;
      animation: progressSlide 1.2s ease infinite;
      box-shadow: 0 0 12px rgba(251,191,36,0.4);
      padding: 0;
      opacity: 1;
      transform: none;
    }
    @keyframes progressSlide {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .error-card {
      margin: 40px 20px;
      padding: 24px;
      border: 1px solid rgba(252, 165, 165, 0.25);
      background: rgba(127, 29, 29, 0.14);
      color: var(--danger);
      align-items: stretch;
      text-align: right;
      box-shadow: 0 0 30px rgba(252, 165, 165, 0.08);
    }

    .error-card h1 {
      margin: 0;
      font-size: 1.15rem;
      color: #fecaca;
    }

    .error-meta {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      direction: ltr;
      background: rgba(0,0,0,0.3);
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.04);
    }

    .error-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
      justify-content: flex-end;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.05);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, background .15s ease, border-color .15s ease, box-shadow .15s ease;
      touch-action: manipulation;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.16);
    }
    .btn:active { transform: scale(0.97); }

    .btn.primary {
      background: rgba(251, 191, 36, .15);
      border-color: rgba(251, 191, 36, .35);
      color: var(--gold);
      box-shadow: 0 0 16px rgba(251,191,36,0.08);
    }
    .btn.primary:hover {
      background: rgba(251, 191, 36, .22);
      box-shadow: 0 0 24px rgba(251,191,36,0.15);
    }

    .btn.danger {
      background: rgba(252, 165, 165, .12);
      border-color: rgba(252, 165, 165, .25);
    }

    .loader h1,
    .error-card h1 {
      font-size: 1.35rem;
      margin: 0;
      letter-spacing: 0.02em;
      color: var(--gold);
      text-shadow: 0 0 20px var(--gold-glow);
    }

    .loader p,
    .error-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    code, pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .tiny-note {
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- ═══════════════════════════════════════════════════ -->
    <!--  SPLASH SCREEN — Twitter/X Style Professional       -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div class="app-loading" id="splash-screen">
      <div class="splash-bg">
        <img src="/assets/backr1.jpg" alt="" class="splash-bg-img" onerror="this.style.display='none'" />
        <div class="splash-bg-overlay"></div>
      </div>

      <div class="splash-content">
        <div class="splash-logo-wrap">
          <svg class="splash-logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="Oraa Logo">
            <defs>
              <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#fbbf24" />
                <stop offset="50%" stop-color="#f59e0b" />
                <stop offset="100%" stop-color="#d97706" />
              </linearGradient>
            </defs>
            <!-- Animated ring -->
            <circle class="logo-ring" cx="50" cy="50" r="42" />
            <!-- Letter O -->
            <text class="logo-o" x="50" y="67" text-anchor="middle"
                  font-family="'Cairo', system-ui, sans-serif"
                  font-weight="900" font-size="50" fill="url(#logoGrad)">O</text>
          </svg>
        </div>

        <h1 class="splash-brand">Oraa</h1>
        <p class="splash-tagline">المنصة العربية الأولى للأنمي</p>

        <div class="splash-spinner">
          <div class="spinner-ring"></div>
        </div>
        <p class="splash-loading-text">جارٍ تحميل التطبيق…</p>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- FIX: Prevent Enter key from refreshing the page      -->
  <!-- ═══════════════════════════════════════════════════ -->
  <script>
    (function() {
      'use strict';
      document.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter') return;
        var tag = (document.activeElement && document.activeElement.tagName) ? document.activeElement.tagName.toUpperCase() : '';
        var typing = (tag === 'INPUT' || tag === 'TEXTAREA' || (document.activeElement && document.activeElement.isContentEditable));
        if (typing) {
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
          return false;
        }
      }, { capture: true, passive: false });
    })();
  </script>

  <script type="module">
    window.__API_READY__ = (async () => {
      const results = await Promise.allSettled([
        import('/api/firebase.js').then(() => console.log('[Boot] Firebase loaded')).catch(e => console.warn('[Boot] Firebase:', e.message)),
        import('/api/anilist.js').then(() => console.log('[Boot] AegisEngine loaded')).catch(e => console.warn('[Boot] AegisEngine:', e.message)),
        import('/api/auth.js').then(() => console.log('[Boot] Auth loaded')).catch(e => console.warn('[Boot] Auth:', e.message))
      ]);
      return results;
    })();
  </script>

  <script type="module">
    await window.__API_READY__;

    let auth, db, storage, analytics, logAppEvent;
    try {
      const fb = await import('/api/firebase.js');
      auth = fb.auth;
      db = fb.db;
      storage = fb.storage;
      analytics = fb.analytics;
      logAppEvent = fb.logAppEvent || (() => {});
    } catch(e) {
      console.warn('[Router] Firebase غير متاح، تشغيل بدون مصادقة');
      logAppEvent = () => {};
    }

    const appRoot = document.getElementById('app');

    const ROUTES = [
      { path: '/',                  module: '/pages/home.js',         title: 'الرئيسية',       description: 'منصة OraaSlayer للأنمي',         themeColor: '#1C4D8D', skeletonType: 'home' },
      { path: '/home',              module: '/pages/home.js',         title: 'الرئيسية',       description: 'منصة OraaSlayer للأنمي',         themeColor: '#1C4D8D', skeletonType: 'home' },
      { path: '/login',             module: '/pages/login.js',        title: 'تسجيل الدخول',    description: 'سجل دخولك إلى OraaSlayer',       themeColor: '#0b0f14', skeletonType: 'auth' },
      { path: '/register',          module: '/pages/register.js',     title: 'إنشاء حساب',       description: 'أنشئ حسابك في OraaSlayer',       themeColor: '#0b0f14', skeletonType: 'auth' },
      { path: '/profile',           module: '/pages/profile.js',      title: 'الملف الشخصي',      auth: true, description: 'ملفك الشخصي',        themeColor: '#0b0f14', skeletonType: 'profile' },
      { path: '/anime/:id/:slug',   module: '/pages/anime.js',        title: (ctx) => `أنمي ${ctx.params.slug || ctx.params.id}`, description: 'صفحة الأنمي', themeColor: '#0b0f14', skeletonType: 'anime' },
      { path: '/anime/:id',         module: '/pages/anime.js',        title: (ctx) => `أنمي ${ctx.params.id}`, description: 'صفحة الأنمي', themeColor: '#0b0f14', skeletonType: 'anime' },
      { path: '/anime',             module: '/pages/anime.js',        title: 'الأنمي',          description: 'تصفح محتوى الأنمي',              themeColor: '#0b0f14', skeletonType: 'anime' },
      { path: '/favorites',         module: '/pages/favorites.js',    title: 'المفضلة',         auth: true, description: 'قائمة الأنمي المفضلة', themeColor: '#0b0f14', skeletonType: 'list' },
      { path: '/servers/:id/:episode', module: '/pages/servers.js',   title: (ctx) => `سيرفرات ${ctx.params.id} - حلقة ${ctx.params.episode}`, auth: true, description: 'قائمة السيرفرات',   themeColor: '#0b0f14', skeletonType: 'servers' },
      { path: '/servers/:id',      module: '/pages/servers.js',      title: (ctx) => `سيرفرات ${ctx.params.id}`, auth: true, description: 'قائمة السيرفرات',   themeColor: '#0b0f14', skeletonType: 'servers' },
      { path: '/servers',          module: '/pages/servers.js',      title: 'السيرفرات',       auth: true, description: 'قائمة السيرفرات',   themeColor: '#0b0f14', skeletonType: 'servers' },
      { path: '/watch/:id/:episode', module: '/pages/watch.js',       title: (ctx) => `مشاهدة ${ctx.params.id} حلقة ${ctx.params.episode}`, auth: true, description: 'مشاهدة الحلقة', themeColor: '#0b0f14', skeletonType: 'watch' },
      { path: '/watch/:id',         module: '/pages/watch.js',        title: (ctx) => `مشاهدة ${ctx.params.id}`, auth: true, description: 'مشاهدة الأنمي', themeColor: '#0b0f14', skeletonType: 'watch' },
      { path: '/watch',             module: '/pages/watch.js',        title: 'المشاهدة',         description: 'شاهد الأنمي',       themeColor: '#0b0f14', skeletonType: 'watch' },
      { path: '/chat',              module: '/pages/chat.js',         title: 'الدردشة',         auth: true, description: 'دردشة المجتمع',     themeColor: '#0b0f14', skeletonType: 'chat' },
      { path: '/redeem',            module: '/pages/redeem_cd.js',    title: 'شحن الكود',       auth: true, description: 'شحن كود الهدية',     themeColor: '#0b0f14', skeletonType: 'auth' },
      { path: '/verify',            module: '/pages/verification.js', title: 'التوثيق',          description: 'مركز التوثيق',                   themeColor: '#0b0f14', skeletonType: 'auth' },
      { path: '/verification',      module: '/pages/verification.js', title: 'التوثيق',          description: 'مركز التوثيق',                   themeColor: '#0b0f14', skeletonType: 'auth' },
      { path: '/newsanime',         module: '/pages/home.js',         title: 'أخبار الأنمي',     description: 'آخر أخبار الأنمي',               themeColor: '#1C4D8D', skeletonType: 'home' },
      { path: '/new',               module: '/pages/home.js',         title: 'المبدعين',         description: 'مجتمع المبدعين',                 themeColor: '#1C4D8D', skeletonType: 'home' },
      { path: '/event_gacha/spin',  module: '/pages/home.js',         title: 'الهدايا والأحداث',  description: 'فعاليات الهدايا',               themeColor: '#1C4D8D', skeletonType: 'home' },
      { path: '/store',             module: '/pages/home.js',         title: 'المتجر',           description: 'متجر OraaSlayer',                themeColor: '#1C4D8D', skeletonType: 'home' },
      { path: '/about',             module: '/pages/home.js',         title: 'عن المنصة',         description: 'عن OraaSlayer',                  themeColor: '#1C4D8D', skeletonType: 'home' },
      { path: '/policy',            module: '/pages/home.js',         title: 'سياسة الخصوصية',     description: 'سياسة الخصوصية',                 themeColor: '#1C4D8D', skeletonType: 'home' },
      { path: '/download',          module: '/pages/home.js',         title: 'تحميل التطبيق',     description: 'حمل تطبيق OraaSlayer',           themeColor: '#1C4D8D', skeletonType: 'home' },
      { path: '/settings',          module: '/pages/home.js',         title: 'الإعدادات',         description: 'إعدادات الحساب',                 themeColor: '#1C4D8D', skeletonType: 'home' },
    ];

    const COMPILED_ROUTES = ROUTES.map((route) => {
      const { regex, keys } = compileRoutePattern(route.path);
      return { ...route, regex, keys };
    });

    const moduleCache = new Map();
    const routeCache = new Map();
    const scrollMemory = new Map();

    let currentCleanup = null;

    const globalStore = {
      userProfile: null,
      lastWatchedAnime: null,
      favorites: [],
      preferences: {},
      ui: {},
      sessionStartedAt: Date.now()
    };

    let activeNavId = 0;
    let currentRoutePath = normalizePath(location.pathname);

    function getAuthUser() {
      try {
        const authState = window.__AUTH__;
        if (authState?.isLoggedIn && authState?.user) return authState.user;
        if (typeof auth === 'function') return auth()?.currentUser ?? null;
        return auth?.currentUser ?? null;
      } catch { return null; }
    }

    function normalizePath(pathname) {
      let path = pathname || '/';
      try { path = decodeURI(path); } catch (_) {}
      path = path.replace(/\/{2,}/g, '/');
      if (path === '/index.html' || path.endsWith('/index.html')) path = '/';
      if (path.length > 1 && path.endsWith('/')) path = path.slice(0, -1);
      return path || '/';
    }

    function splitUrl(raw) {
      const url = new URL(raw, location.origin);
      return { pathname: normalizePath(url.pathname), search: url.search, hash: url.hash, url };
    }

    function compileRoutePattern(pattern) {
      const keys = [];
      const clean = normalizePath(pattern);
      const parts = clean.split('/').filter(Boolean).map((segment) => {
        if (segment.startsWith(':')) { keys.push(segment.slice(1)); return '([^\\/]+)'; }

    function onLinkClick(e) {

      const href = link.getAttribute('href');
      if (!href || href.startsWith('http:') || href.startsWith('https:') || href.startsWith('mailto:') || href.startsWith('tel:') || href.startsWith('#')) return;
      if (e.defaultPrevented || e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
      e.preventDefault();

    }

    function onLinkHover(e) {
      const link = e.target.closest?.('a[data-link]');
      if (!link) return;
      const href = link.getAttribute('href');
      if (!href || href.startsWith('http:') || href.startsWith('https:') || href.startsWith('mailto:') || href.startsWith('tel:') || href.startsWith('#')) return;
      prefetchByHref(href);

      safeLogEvent('app_start', { version: 'router-shell-v7', platform: 'web', path: normalizePath(location.pathname) });

    selectedBox.style.display="block"; selectedBox.style.left="".concat(rect.left-2,"px"); selectedBox.style.top="".concat(rect.top-2,"px"); selectedBox.style.width="".concat(rect.width+4,"px"); selectedBox.style.height="".concat(rect.height+4,"px");
    selectedLabel.style.display="block"; selectedLabel.textContent="\u2713 <".concat(element.tagName.toLowerCase(),">");
    var labelTop=rect.top-28, labelLeft=rect.left;
    if(labelTop<5) labelTop=rect.bottom+5;
    var labelWidth=selectedLabel.offsetWidth||100;
    if(labelLeft+labelWidth>window.innerWidth-10) labelLeft=window.innerWidth-labelWidth-10;
    selectedLabel.style.left="".concat(Math.max(5,labelLeft),"px"); selectedLabel.style.top="".concat(labelTop,"px");
  }

  function getElementSelector(element) {
    if(!(element instanceof Element)) throw new Error('Argument must be a DOM element');
    var segments=[], current=element;
    while(current!==document.documentElement) {
      var selector='';
      if(current.id&&document.querySelectorAll("#".concat(current.id)).length===1){segments.unshift("#".concat(current.id));break;}
      var classes=Array.from(current.classList).filter(function(c){return !c.startsWith('js-');});
      var className=classes.length>0?".".concat(classes[0]):'';
      var tag=current.tagName.toLowerCase();
      if(!className){var siblings=Array.from(current.parentNode.children);var index=siblings.findIndex(function(el){return el===current;})+1;selector="".concat(tag,":nth-child(").concat(index,")");}else{selector=className;}
      segments.unshift(selector); current=current.parentElement;
    }
    if(current===document.documentElement) segments.unshift('html');
    return segments.join(' > ');
  }

  function getElementText(element) {
    if(element.tagName==="INPUT"||element.tagName==="TEXTAREA") return element.value||element.placeholder||"";
    var text=(element.textContent||"").trim();
    return text.length>50?text.substring(0,50)+"...":text;
  }

  function getElementAttributes(element) {var attrs={};for(var i=0;i<element.attributes.length;i++){var attr=element.attributes[i];attrs[attr.name]=attr.value;}return attrs;}

  function handleMouseOver(e) {
    if(!highlightEnabled) return;

    highlightBox.style.display="block"; highlightBox.style.left="".concat(rect.left-2,"px"); highlightBox.style.top="".concat(rect.top-2,"px"); highlightBox.style.width="".concat(rect.width+4,"px"); highlightBox.style.height="".concat(rect.height+4,"px");
    tagLabel.style.display="block"; tagLabel.textContent="<".concat(target.tagName.toLowerCase(),">");
    var labelTop=rect.top-22, labelLeft=rect.left;
    if(labelTop<0) labelTop=rect.bottom+5;
    if(labelLeft+tagLabel.offsetWidth>window.innerWidth) labelLeft=window.innerWidth-tagLabel.offsetWidth-5;
    tagLabel.style.left="".concat(Math.max(0,labelLeft),"px"); tagLabel.style.top="".concat(labelTop,"px");
    try{window.parent.postMessage({type:"iframe-element-hover",data:{tagName:target.tagName.toLowerCase(),rect:{left:rect.left,top:rect.top,right:rect.right,bottom:rect.bottom,width:rect.width,height:rect.height,x:rect.x,y:rect.y},selector:selector,text:text,attributes:attributes,url:window.location.href,path:window.location.pathname,timestamp:Date.now()},source:"iframe-highlight-injector"},"*");}catch(error){}
  }

  function handleMouseOut(e) {

    try{window.parent.postMessage({type:"iframe-element-hover",data:null,source:"iframe-highlight-injector"},"*");}catch(error){}
  }

  function handleClick(e) {
    var target=e.target;
    if(!target||target===overlay||target===highlightBox||target===tagLabel||target===selectedBox||target===selectedLabel||target===document.documentElement||target===document.body) return;

    var rect=target.getBoundingClientRect(), selector=getElementSelector(target), text=getElementText(target), attributes=getElementAttributes(target);
    updateSelectedHighlight(target);
    highlightBox.style.display="none"; tagLabel.style.display="none";
    try{window.parent.postMessage({type:"iframe-element-click",data:{tagName:target.tagName.toLowerCase(),rect:{left:rect.left,top:rect.top,right:rect.right,bottom:rect.bottom,width:rect.width,height:rect.height,x:rect.x,y:rect.y},selector:selector,text:text,attributes:attributes,url:window.location.href,path:window.location.pathname,timestamp:Date.now()},source:"iframe-highlight-injector"},"*");}catch(error){}
  }

  function handleParentMessage(event) {
    if(event.data.type==="iframe-highlight-toggle"||event.data.type==="enable-iframe-highlight"||event.data.type==="toggle-iframe-highlight"){var enabled=event.data.enabled!==undefined?event.data.enabled:true;if(enabled)enableHighlight();else disableHighlight();}

    else if(event.data.type==="update-selected-element"){var selector=event.data.selector;if(selector){try{var element=document.querySelector(selector);updateSelectedHighlight(element);}catch(error){updateSelectedHighlight(null);}}else updateSelectedHighlight(null);}

  function enableHighlight(){document.addEventListener("mouseover",handleMouseOver,true);document.addEventListener("mouseout",handleMouseOut,true);document.addEventListener("click",handleClick,true);highlightEnabled=true;overlay.style.display="block";}
  function disableHighlight(){highlightEnabled=false;highlightBox.style.display="none";tagLabel.style.display="none";}
  function fullyDisableHighlight(){highlightEnabled=false;document.removeEventListener("mouseover",handleMouseOver,true);document.removeEventListener("mouseout",handleMouseOut,true);document.removeEventListener("click",handleClick,true);overlay.style.display="none";highlightBox.style.display="none";tagLabel.style.display="none";selectedBox.style.display="none";selectedLabel.style.display="none";}

  enableHighlight();
  window.addEventListener("message",handleParentMessage);
  window.__iframeHighlightControl={enable:enableHighlight,disable:disableHighlight,fullyDisable:fullyDisableHighlight,isEnabled:function(){return highlightEnabled;},getSelectedElement:function(){return selectedElement;},updateSelected:updateSelectedHighlight};
  
  try{window.parent.postMessage({type:"iframe-highlight-ready",data:{url:window.location.href,userAgent:navigator.userAgent,timestamp:Date.now()},source:"iframe-highlight-injector"},"*");}catch(error){}

})();
